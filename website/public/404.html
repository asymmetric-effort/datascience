<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect: convert path to hash route
    var path = window.location.pathname;
    if (path !== "/" && path !== "/index.html") {
      window.location.replace("/#" + path);
    }
  </script>
</head>
<body></body>
</html>
