name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Stage 1: Lint and Test (must pass before anything else)
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: asymmetric-effort/actions/actions/checkout@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

      - name: Set up Go
        uses: asymmetric-effort/actions/actions/setup-go@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: asymmetric-effort/actions/actions/setup-node@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          node-version: 24

      - name: Set up Python
        uses: asymmetric-effort/actions/actions/setup-python@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          python-version: "3.12"

      - name: Install pgmpy
        run: pip install -r tests/python/requirements.txt

      - name: Go vet
        run: go vet ./...

      - name: Go format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go unit tests
        run: go test -tags unit -v -race -coverprofile=coverage.out ./...

      - name: Go coverage enforcement
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          threshold=50
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "ERROR: Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

      - name: Verify fixtures are up to date
        run: |
          go generate ./...
          if ! git diff --quiet tests/fixtures/; then
            echo "ERROR: Fixtures are out of date. Run 'go generate ./...' and commit."
            git diff tests/fixtures/
            exit 1
          fi

      - name: Install website dependencies
        working-directory: website
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        working-directory: website
        run: npx tsc --noEmit

  # Stage 2: Build website
  build-website:
    name: Build Website
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: asymmetric-effort/actions/actions/checkout@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

      - name: Set up Node
        uses: asymmetric-effort/actions/actions/setup-node@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: website
        run: npm install --no-audit --no-fund

      - name: Build website
        working-directory: website
        run: npx vite build

      - name: Upload website artifact
        uses: asymmetric-effort/actions/actions/upload-pages-artifact@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          path: website/dist

  # Stage 3: Deploy website to GitHub Pages (main branch only)
  deploy-website:
    name: Deploy Website
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-website
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: asymmetric-effort/actions/actions/deploy-pages@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

  # Stage 4: Post-deployment verification
  verify:
    name: Post-Deployment Verification
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: deploy-website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: asymmetric-effort/actions/actions/checkout@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

      - name: Set up Go
        uses: asymmetric-effort/actions/actions/setup-go@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          go-version-file: go.mod

      - name: Verify Go library installs
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd $(mktemp -d)
          go mod init verify-datascience
          go get github.com/asymmetric-effort/datascience@${COMMIT_SHA}
          echo "Go library installs successfully"

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Verify website is live
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://datascience.asymmetric-effort.com/)
          echo "HTTP status: $status"
          if [ "$status" -ne 200 ]; then
            echo "Website returned non-200 status"
            exit 1
          fi

      - name: Verify website content
        run: |
          body=$(curl -s https://datascience.asymmetric-effort.com/)
          echo "$body" | grep -q '<div id="root">' || { echo "Missing root element"; exit 1; }
          echo "Website content verified"

      - name: Verify CNAME
        run: |
          body=$(curl -s https://datascience.asymmetric-effort.com/CNAME)
          echo "$body" | grep -q "datascience.asymmetric-effort.com" || { echo "CNAME mismatch"; exit 1; }
          echo "CNAME verified"

      - name: Verify robots.txt
        run: |
          body=$(curl -s https://datascience.asymmetric-effort.com/robots.txt)
          echo "$body" | grep -q "Sitemap:" || { echo "Missing sitemap in robots.txt"; exit 1; }
          echo "robots.txt verified"

      - name: Verify sitemap.xml
        run: |
          body=$(curl -s https://datascience.asymmetric-effort.com/sitemap.xml)
          echo "$body" | grep -q "datascience.asymmetric-effort.com" || { echo "Sitemap missing URLs"; exit 1; }
          echo "sitemap.xml verified"

  # Stage 5: Index on Go module proxy (tagged versions only)
  index-go-proxy:
    name: Index Go Module
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Poke Go module proxy
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Indexing ${REF_NAME} on proxy.golang.org..."
          curl -sf "https://proxy.golang.org/github.com/asymmetric-effort/datascience/@v/${REF_NAME}.info"
          echo ""
          echo "Indexed successfully."
