name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript]

    steps:
      - name: Checkout
        uses: asymmetric-effort/actions/actions/checkout@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

      - name: Initialize CodeQL
        uses: asymmetric-effort/actions/actions/codeql-init@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: asymmetric-effort/actions/actions/codeql-autobuild@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9

      - name: Perform CodeQL Analysis
        uses: asymmetric-effort/actions/actions/codeql-analyze@488ac7a4c06233353a7b7e02467f731f9ac19ddd # v1.0.9
        with:
          category: "/language:${{ matrix.language }}"
